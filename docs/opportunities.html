<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CauseCircuit - Volunteer Opportunities</title>
	
	<style>
		/* Base Filter CSS & Dropdowns */
		.filter-dropdown option {
			background: #1e293b;
			color: #e2e8f0;
		}

		.filter-dropdown:hover, .filter-dropdown:focus {
			outline: none;
			border-color: #60a5fa;
			box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
		}

		@media (max-width: 768px) {
			.filter-container {
				flex-direction: column;
				align-items: stretch;
				gap: 15px;
			}
			.filter-group {
				flex-direction: column;
				align-items: flex-start;
				gap: 6px;
			}
			.filter-dropdown {
				width: 100%;
			}
		}

		/* Main Content Section */
		.content-section {
			background: transparent;
			padding: clamp(60px, 8vw, 100px) 0;
		}

		.container {
			max-width: 1400px;
			margin: 0 auto;
			padding: 0 clamp(20px, 5vw, 50px);
		}

		/* Hours Tracker Section Styling */
		.hours-tracker-box {
			background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
			backdrop-filter: blur(20px);
			border: 1px solid rgba(96, 165, 250, 0.2);
			border-radius: 20px;
			padding: 30px;
			margin-bottom: 40px;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
		}

		.tracker-content {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 30px;
			flex-wrap: wrap;
		}

		.tracker-text {
			flex: 1;
			min-width: 280px;
		}

		.tracker-text h3 {
			font-family: 'Space Grotesk', sans-serif;
			color: #f8fafc;
			font-size: 1.5rem;
			margin-bottom: 8px;
			font-weight: 700;
			margin-top: 0;
		}

		.tracker-text p {
			color: #cbd5e1;
			font-size: 0.95rem;
			line-height: 1.6;
			margin: 0;
		}

		.tracker-btn {
			background: linear-gradient(135deg, #10b981 0%, #059669 100%);
			color: white !important;
			padding: 14px 28px;
			text-decoration: none;
			border-radius: 12px;
			font-weight: 600;
			font-size: 1rem;
			transition: all 0.3s ease;
			white-space: nowrap;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
		}

		.tracker-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
			background: linear-gradient(135deg, #059669 0%, #047857 100%);
		}

		.tracker-btn span {
			transition: transform 0.3s ease;
		}

		.tracker-btn:hover span {
			transform: translateX(4px);
		}

		@media (max-width: 768px) {
			.tracker-content {
				flex-direction: column;
				text-align: center;
			}
			.tracker-btn {
				width: 100%;
				justify-content: center;
			}
		}

		/* Dynamic Grid System */
		.opportunities-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(min(100%, 350px), 1fr));
			gap: clamp(20px, 3vw, 35px);
			margin-top: 40px;
		}

		.no-results {
			text-align: center;
			color: #e2e8f0;
			font-size: 1.2rem;
			padding: 60px 20px;
			grid-column: 1 / -1;
		}

		/* Enhanced Opportunity Cards */
		.opportunity-card {
			background: rgba(30, 41, 59, 0.8);
			backdrop-filter: blur(20px);
			border: 1px solid rgba(148, 163, 184, 0.1);
			border-radius: 24px;
			overflow: hidden;
			transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
			opacity: 0;
			transform: translateY(40px);
			position: relative;
			cursor: pointer;
		}

		.opportunity-card::before {
			content: '';
			position: absolute;
			top: 0;
			left: -100%;
			width: 100%;
			height: 100%;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
			transition: left 0.8s ease;
			z-index: 1;
		}

		.opportunity-card:hover::before {
			left: 100%;
		}

		.opportunity-card.animate {
			opacity: 1;
			transform: translateY(0);
		}

		.opportunity-card:hover {
			transform: translateY(-8px) scale(1.02);
			border-color: rgba(96, 165, 250, 0.3);
			box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(96, 165, 250, 0.1);
		}

		.card-image-container {
			position: relative;
			height: 220px;
			overflow: hidden;
		}

		.opportunity-card img {
			width: 100%;
			height: 100%;
			object-fit: cover;
			transition: transform 0.4s ease;
		}

		.opportunity-card:hover img {
			transform: scale(1.1);
		}

		.location-tag {
			position: absolute;
			top: 16px;
			right: 16px;
			background: rgba(15, 23, 42, 0.9);
			backdrop-filter: blur(10px);
			color: #60a5fa;
			padding: 6px 14px;
			border-radius: 20px;
			font-size: 0.85rem;
			font-weight: 600;
			border: 1px solid rgba(96, 165, 250, 0.3);
			z-index: 2;
		}

		.card-content {
			padding: clamp(20px, 4vw, 32px);
			position: relative;
			z-index: 2;
		}

		.card-content h3 {
			font-size: clamp(1.2rem, 2.5vw, 1.5rem);
			color: #f8fafc;
			margin-bottom: 12px;
			font-weight: 700;
			line-height: 1.3;
			font-family: 'Space Grotesk', sans-serif;
		}

		.card-content p {
			color: #cbd5e1;
			line-height: 1.6;
			margin-bottom: 24px;
			font-size: clamp(0.9rem, 2vw, 1rem);
			font-weight: 400;
		}

		.commitment-tags {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 16px;
		}

		.commitment-tag {
			background: rgba(59, 130, 246, 0.15);
			color: #93c5fd;
			padding: 4px 10px;
			border-radius: 12px;
			font-size: 0.8rem;
			font-weight: 500;
		}

		.commitment-tag.flexible {
			background: rgba(59, 130, 246, 0.15);
			color: #93c5fd;
		}

		.hours-per-week {
			color: #94a3b8;
			font-size: 0.9rem;
			margin-bottom: 16px;
		}

		.card-btn {
			display: inline-flex;
			align-items: center;
			background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
			color: white;
			padding: 12px 24px;
			text-decoration: none;
			border-radius: 12px;
			font-weight: 600;
			transition: all 0.3s ease;
			cursor: pointer;
			border: none;
			font-size: 0.95rem;
			gap: 8px;
			position: relative;
			overflow: hidden;
		}

		.card-btn::before {
			content: '';
			position: absolute;
			top: 0;
			left: -100%;
			width: 100%;
			height: 100%;
			background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
			transition: left 0.5s ease;
		}

		.card-btn:hover::before {
			left: 100%;
		}

		.card-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
		}

		.card-btn:after {
			content: ' →';
			transition: transform 0.3s ease;
		}

		.card-btn:hover:after {
			transform: translateX(4px);
		}

		/* Popup Design */
		.popup {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 0, 0, 0.8);
			backdrop-filter: blur(10px);
			display: flex;
			justify-content: center;
			align-items: center;
			opacity: 0;
			visibility: hidden;
			transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
			z-index: 10001;
			padding: 20px;
		}

		.popup.active {
			opacity: 1;
			visibility: visible;
		}

		.popup-content {
			background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
			border: 1px solid rgba(148, 163, 184, 0.2);
			border-radius: 28px;
			max-width: min(90vw, 700px);
			width: 100%;
			max-height: 85vh;
			overflow: hidden;
			box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(148, 163, 184, 0.1);
			transform: scale(0.8) translateY(40px);
			transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
			position: relative;
			display: flex;
			flex-direction: column;
		}

		.popup.active .popup-content {
			transform: scale(1) translateY(0);
		}

		.popup-header {
			position: relative;
			height: clamp(200px, 30vw, 320px);
			overflow: hidden;
		}

		.popup-header img {
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		.popup-header::after {
			content: '';
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			height: 100px;
			background: linear-gradient(transparent, rgba(30, 41, 59, 0.9));
		}

		/* Popup Detail Classes */
		.popup-title {
			font-family: 'Space Grotesk', sans-serif;
			color: #f8fafc;
			padding: 20px 24px 10px;
			margin: 0;
			font-size: 1.8rem;
		}

		.popup-scroll-content {
			overflow-y: auto;
			padding: 0 24px 20px;
			flex: 1;
		}

		.popup-body {
			color: #cbd5e1;
			line-height: 1.7;
		}

		.popup-actions {
			padding: 20px 24px;
			background: rgba(15, 23, 42, 0.4);
			display: flex;
			justify-content: flex-end;
			gap: 12px;
			border-top: 1px solid rgba(148, 163, 184, 0.1);
		}

		.volunteer-btn {
			background: linear-gradient(135deg, #10b981 0%, #059669 100%);
			color: white;
			text-decoration: none;
			padding: 12px 24px;
			border-radius: 12px;
			font-weight: 600;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			transition: all 0.3s ease;
		}

		.volunteer-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
		}

		.popup-close {
			background: #475569;
			color: #f1f5f9;
			border: none;
			padding: 12px 24px;
			border-radius: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: background 0.3s ease;
		}

		.popup-close:hover {
			background: #64748b;
		}

		.popup-location-tag {
			position: absolute;
			top: 16px;
			right: 16px;
			background: rgba(15, 23, 42, 0.9);
			color: #60a5fa;
			padding: 8px 16px;
			border-radius: 20px;
			font-weight: 600;
			border: 1px solid rgba(96, 165, 250, 0.3);
			z-index: 2;
		}

		@media (max-width: 768px) {
			.popup-content {
				max-height: calc(100vh - 40px);
				border-radius: 20px;
			}

			.popup-header {
				height: 200px;
			}

			.popup-location-tag {
				top: 16px;
				padding: 8px 14px;
				font-size: 0.8rem;
			}

			.popup-actions {
				flex-direction: column;
			}

			.volunteer-btn, .popup-close {
				width: 100%;
				justify-content: center;
			}

			.card-image-container {
				height: 180px;
			}
		}

		/* Large Desktop Optimization */
		@media (min-width: 1400px) {
			.opportunities-grid {
				grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
			}
		}

		/* Dark mode scrollbar styling */
		* {
			scrollbar-width: thin;
			scrollbar-color: rgba(96, 165, 250, 0.3) transparent;
		}

		*::-webkit-scrollbar {
			width: 8px;
			height: 8px;
		}

		*::-webkit-scrollbar-track {
			background: transparent;
		}

		*::-webkit-scrollbar-thumb {
			background: rgba(96, 165, 250, 0.3);
			border-radius: 10px;
		}

		*::-webkit-scrollbar-thumb:hover {
			background: rgba(96, 165, 250, 0.5);
		}
	</style>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>
	<div class="popup" id="popup">
		<div class="popup-content" id="popup-content"></div>
	</div>

	<div id="page-wrapper">

		<header id="header" style="background: rgba(15, 23, 42, 0.9); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
			<h1 style="margin: 0; font-size: 1.5rem;"><a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center;"><img src="images/causecircuit-logo.png" alt="CauseCircuit Logo" style="width: 36px; height: 36px; margin-right: 12px; vertical-align: middle;">CauseCircuit</a></h1>

			<nav id="nav">
				<ul style="list-style: none; display: flex; gap: 20px; margin: 0; padding: 0;">
					<li><a href="index.html" style="color: white; text-decoration: none;">Home</a></li>
					<li><a href="aboutus.html" style="color: white; text-decoration: none;">About Us</a></li>
					<li><a href="opportunities.html" style="color: #60a5fa; text-decoration: none; font-weight: bold;">Opportunities</a></li>
				</ul>
			</nav>
		</header>

		<section class="filter-section" style="margin-top: 40px;">
			<div class="filter-container" style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 16px; margin: 0 auto; max-width: 1300px;">
				
				<div class="filter-group" style="display: flex; align-items: center; gap: 10px;">
					<label class="filter-label" for="location-filter" style="color: white; font-weight: 600;">Location:</label>
					<select id="location-filter" class="filter-dropdown" style="background: #0f172a; color: white; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);">
						<option value="all">All Durham Region</option>
						<option value="Oshawa">Oshawa</option>
						<option value="Pickering">Pickering</option>
						<option value="Ajax">Ajax</option>
						<option value="Whitby">Whitby</option>
						<option value="Clarington">Clarington</option>
						<option value="Uxbridge">Uxbridge</option>
						<option value="Scugog">Scugog</option>
						<option value="Brock">Brock</option>
					</select>
				</div>

				<div class="filter-group" style="display: flex; align-items: center; gap: 10px;">
					<label class="filter-label" for="commitment-filter" style="color: white; font-weight: 600;">Commitment:</label>
					<select id="commitment-filter" class="filter-dropdown" style="background: #0f172a; color: white; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);">
						<option value="all">Any Hours</option>
						<option value="short">Short Term (1-3 hrs/wk)</option>
						<option value="medium">Medium Term (4-10 hrs/wk)</option>
						<option value="long">Long Term (10+ hrs/wk)</option>
					</select>
				</div>
			</div>
		</section>

		<section class="content-section">
			<div class="container">
				<div class="hours-tracker-box">
					<div class="tracker-content">
						<div class="tracker-text">
							<h3>Host an Opportunity</h3>
							<p>Are you a local business or non-profit organization looking for passionate volunteers? Submit your upcoming events or positions through our registration form to feature them directly on CauseCircuit.</p>
						</div>
						<a href="https://docs.google.com/forms/d/e/1FAIpQLScPTGMjG8bAwur0PfyHHqny6MrITTyP1jQ2j-aAMlXtHO_wMQ/viewform?usp=header" target="_blank" class="tracker-btn">
							Post an Opportunity <span>→</span>
						</a>
					</div>
				</div>
				
				<div class="opportunities-grid" id="opportunities-container">
				</div>
			</div>
		</section>
	</div>

	<script>
		// Core Data Array (Populated dynamically by Google Sheets)
		let volunteerOpportunities = [];

		// Published Google Sheets CSV URL
		const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRINdpIfqYzmz7lNtKIkIuz75kA3wAOtAyE2lThkMty1Gpn7X9p3xIFLXV-hyX28PC-0LyFreFc1JXU/pub?gid=841646133&single=true&output=csv";

		// Centralized Filter Calculation
		function filterOpportunities(location, commitment) {
			let filtered = [...volunteerOpportunities];

			// 1. Filter by Location Name
			if (location !== 'all') {
				filtered = filtered.filter(opp => opp.city.toLowerCase() === location.toLowerCase());
			}

			// 2. Filter by Time Commitment Categories
			if (commitment !== 'all') {
				filtered = filtered.filter(opp => opp.timeCommitment === commitment);
			}
			
			return filtered;
		}

		// Opportunity card generator
		function generateOpportunityCards(opportunities = volunteerOpportunities) {
			const container = document.getElementById('opportunities-container');
			if (!container) return;
			container.innerHTML = ''; 
			
			if (opportunities.length === 0) {
				container.innerHTML = '<div class="no-results">No volunteer opportunities match your current filters. Try adjusting your preferences.</div>';
				return;
			}
			
			opportunities.forEach((opportunity, index) => {
				const card = document.createElement('div');
				card.className = 'opportunity-card';
				card.style.transitionDelay = `${index * 0.05}s`;
				
				let commitmentTagHTML = opportunity.timeCommitment ? 
					`<div class="commitment-tags"><span class="commitment-tag flexible">${opportunity.timeCommitment.toUpperCase()} Commitment</span></div>` : '';
				
				let hoursHTML = opportunity.hoursPerWeek ? `<div class="hours-per-week">Hours Required: ${opportunity.hoursPerWeek}</div>` : '';
				
				// 1. Clean and format the website URL
				let targetUrl = opportunity.website ? opportunity.website.trim() : '#';
				
				// Automatically prepends 'https://' if the user forgot to type it in the form
				if (targetUrl !== '#' && targetUrl !== '' && !/^https?:\/\//i.test(targetUrl)) {
					targetUrl = 'https://' + targetUrl;
				}

				// 2. Decide if the button should be a direct link or trigger the details popup
				let buttonHTML = '';
				if (targetUrl && targetUrl !== '#') {
					// Direct external link (opens in a new tab)
					buttonHTML = `<a href="${targetUrl}" target="_blank" class="card-btn" style="text-decoration: none; display: inline-flex; align-items: center;">Learn More</a>`;
				} else {
					// Fallback popup trigger (retains the "special" class for the modal event listener)
					buttonHTML = `<button class="card-btn special">Learn More</button>`;
				}
				
				card.innerHTML = `
					<div class="card-image-container">
						<img src="${opportunity.imagePath}" alt="${opportunity.name}" onerror="this.src='images/causecircuit-logo.png'" />
						<div class="location-tag">${opportunity.city}</div>
					</div>
					<div class="card-content">
						<h3>${opportunity.name}</h3>
						<p style="margin-bottom: 8px; color: #60a5fa; font-weight: 600;">${opportunity.company}</p>
						<p>${opportunity.description}</p>
						${commitmentTagHTML}
						${hoursHTML}
						${buttonHTML}
					</div>
				`;
				container.appendChild(card);
			});

			// CSS transition animation helper
			setTimeout(() => {
				document.querySelectorAll('.opportunity-card').forEach(card => {
					card.classList.add('animate');
				});
			}, 50);
		}

		// Filter controller trigger
		function applyFilters() {
			const locationFilter = document.getElementById('location-filter').value;
			const commitmentFilter = document.getElementById('commitment-filter').value;
			
			const filteredOpportunities = filterOpportunities(locationFilter, commitmentFilter);
			generateOpportunityCards(filteredOpportunities);
		}

		// Papa Parse Dynamic Fetch Route with Cache-Buster built right in
		async function fetchLiveSheetsData() {
			try {
				const cacheBuster = `&t=${new Date().getTime()}`;
				const response = await fetch(SHEET_CSV_URL + cacheBuster);
				const csvText = await response.text();
				
				Papa.parse(csvText, {
					header: true,
					skipEmptyLines: true,
					complete: function(results) {
						// 1. Filter out completely empty or placeholder rows first
						const validRows = results.data.filter(row => {
							const title = row['What is your Opportunity Title?'] ? row['What is your Opportunity Title?'].trim() : '';
							const org = row['What is your Organization Name?'] ? row['What is your Organization Name?'].trim() : '';
							
							// Only keep the row if it actually has a Title OR an Organization Name
							return title !== '' || org !== '';
						});

						// 2. Map only the valid, filled-out rows to tiles
						volunteerOpportunities = validRows.map(row => {
							const rawHours = row['What are the Hours Required to work?'] || '';
							const hoursNum = parseInt(rawHours, 10);
							
							let commitment = 'flexible';
							if (!isNaN(hoursNum)) {
								if (hoursNum <= 3) commitment = 'short';
								else if (hoursNum <= 10) commitment = 'medium';
								else commitment = 'long';
							}

							return {
								name: row['What is your Opportunity Title?'] || 'Volunteer Helper',
								company: row['What is your Organization Name?'] || 'Anonymous Org',
								description: row['What is the Description?'] || 'No description provided.',
								detailedDescription: row['What is the Description?'] || 'No description provided.',
								imagePath: row['Is there a Logo/Image URL for your organization?'] || 'images/causecircuit-logo.png',
								website: row['Website URL'] || '#', 
								city: row['Where is the Location/City?'] || 'Oshawa',
								timeCommitment: commitment,
								hoursPerWeek: row['What are the Hours Required to work?'] || 'Flexible'
							};
						});

						// Display fully initialized cards immediately
						generateOpportunityCards();
					}
				});
			} catch (error) {
				console.error("Error loading live data stream:", error);
				const container = document.getElementById('opportunities-container');
				if (container) {
					container.innerHTML = `<p style="color: #ef4444; text-align: center;">Failed to load live opportunities.</p>`;
				}
			}
		}

		// DOM Initialization listeners
		document.addEventListener('DOMContentLoaded', function() {
			fetchLiveSheetsData();

			// UI Event Listeners
			document.getElementById('location-filter').addEventListener('change', applyFilters);
			document.getElementById('commitment-filter').addEventListener('change', applyFilters);

			const popup = document.getElementById('popup');
			const popupContent = document.getElementById('popup-content');

			// Modal delegated layout click event handlers
			document.addEventListener('click', function(event) {
				if (event.target.classList.contains('special')) {
					event.preventDefault();
					const card = event.target.closest('.opportunity-card');
					if (card) {
						const titleText = card.querySelector('h3').textContent;
						const opportunity = volunteerOpportunities.find(opp => opp.name === titleText);

						if (opportunity) {
							popupContent.innerHTML = `
								<div class="popup-header">
									<img src="${opportunity.imagePath}" alt="${opportunity.name}" onerror="this.src='images/causecircuit-logo.png'" />
									<div class="popup-location-tag">${opportunity.city}</div>
								</div>
								<h2 class="popup-title">${opportunity.name}</h2>
								<div class="popup-scroll-content">
									<div class="popup-body">
										<p style="color: #60a5fa; font-weight: 700; font-size: 1.1rem; margin-bottom: 12px;">Organization: ${opportunity.company}</p>
										<p>${opportunity.detailedDescription}</p>
									</div>
								</div>
								<div class="popup-actions">
									<a href="${opportunity.website}" target="_blank" class="volunteer-btn">
										<span>Volunteer Now</span>
										<span>→</span>
									</a>
									<button class="popup-close">Close</button>
								</div>
							`;
							
							popup.classList.add('active');
							
							popupContent.querySelector('.popup-close').addEventListener('click', () => {
								popup.classList.remove('active');
							});
						}
					}
				}
			});

			popup.addEventListener('click', (event) => {
				if (event.target === popup) {
					popup.classList.remove('active');
				}
			});
		});
	</script>
</body>
</html>

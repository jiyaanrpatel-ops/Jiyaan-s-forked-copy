<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CauseCircuit - Volunteer Opportunities</title>
	
	<style>
		/* Custom styles matching the About Us visual theme */
		
		/* Header Override Styles */
		#header {
			position: fixed !important;
			top: 0 !important;
			left: 0 !important;
			right: 0 !important;
			width: 100% !important;
			z-index: 10000 !important;
			background: rgba(44, 62, 80, 0.95) !important;
			backdrop-filter: blur(10px) !important;
			opacity: 1 !important;
			visibility: visible !important;
			transform: translateY(0) !important;
			transition: all 0.3s ease !important;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px 40px;
			border-bottom: 1px solid rgba(255,255,255,0.1);
		}

		#header h1 {
			margin: 0;
			font-size: 1.5rem;
		}

		#header h1 a {
			color: white !important;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
		}

		#header h1 a img {
			width: 36px;
			height: 36px;
			margin-right: 12px;
			vertical-align: middle;
		}

		#nav ul {
			list-style: none;
			display: flex;
			gap: 20px;
			margin: 0;
			padding: 0;
		}

		#nav ul li a {
			color: white !important;
			text-decoration: none;
			transition: color 0.3s ease;
		}

		#nav ul li a:hover {
			color: #60a5fa !important;
		}

		#nav ul li a.active {
			color: #60a5fa !important;
			font-weight: bold;
		}

		body {
			background: #f8f9fa;
			font-family: 'Arial', sans-serif;
			overflow-x: hidden;
			padding-top: 80px; /* Space for fixed header */
			margin: 0;
		}

		/* Hero Section (Matching About Us Backdrop) */
		.hero-section {
			background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
			height: 60vh; /* Scaled header height for clean landing */
			min-height: 400px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			position: relative;
			overflow: hidden;
		}

		.hero-content {
			color: white;
			max-width: 800px;
			padding: 0 20px;
			animation: fadeInUp 1.5s ease-out;
			z-index: 2;
		}

		.hero-content h1 {
			font-size: 3.5rem;
			font-weight: 700;
			margin-bottom: 20px;
			letter-spacing: -2px;
		}

		.hero-content p {
			font-size: 1.3rem;
			margin-bottom: 30px;
			opacity: 0.9;
			line-height: 1.6;
		}

		/* Floating particles */
		.particle {
			position: absolute;
			background: rgba(255, 255, 255, 0.3);
			border-radius: 50%;
			animation: float 6s ease-in-out infinite;
		}

		/* Main Filters Styles */
		.filter-section {
			margin-top: -40px; /* Overlaps elegantly with the hero section background */
			position: relative;
			z-index: 10;
			padding: 0 20px;
		}

		.filter-container {
			display: flex;
			gap: 20px;
			justify-content: center;
			flex-wrap: wrap;
			background: rgba(30, 41, 59, 0.95);
			backdrop-filter: blur(15px);
			padding: 25px;
			border-radius: 20px;
			margin: 0 auto;
			max-width: 1200px;
			align-items: center;
			box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.filter-group {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.filter-label {
			color: white;
			font-weight: 600;
		}

		.filter-dropdown {
			background: #0f172a;
			color: white;
			padding: 10px 15px;
			border-radius: 8px;
			border: 1px solid rgba(255,255,255,0.2);
			font-size: 0.95rem;
			transition: all 0.3s ease;
		}

		.filter-dropdown option {
			background: #1e293b;
			color: #e2e8f0;
		}

		.filter-dropdown:hover, .filter-dropdown:focus {
			outline: none;
			border-color: #60a5fa;
			box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
		}

		/* Blue Use Location Button Styling */
		.use-location-btn {
			background: #2563eb;
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 8px;
			font-weight: bold;
			cursor: pointer;
			transition: all 0.2s ease;
			box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
			display: inline-flex;
			align-items: center;
			gap: 6px;
			white-space: nowrap;
			height: 42px;
		}

		.use-location-btn:hover {
			background: #1d4ed8;
			transform: translateY(-1px);
			box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
		}

		.use-location-btn:active {
			transform: translateY(1px);
		}

		/* Main Content Layout container */
		.content-section {
			background: #4C5C96; /* Matching about us content section background */
			padding: 80px 0;
			min-height: 600px;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 50px;
		}

		/* Hours Tracker Section Styling */
		.hours-tracker-box {
			background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
			backdrop-filter: blur(20px);
			border: 1px solid rgba(96, 165, 250, 0.2);
			border-radius: 20px;
			padding: 30px;
			margin-bottom: 40px;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
		}

		.tracker-content {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 30px;
			flex-wrap: wrap;
		}

		.tracker-text {
			flex: 1;
			min-width: 280px;
		}

		.tracker-text h3 {
			color: #f8fafc;
			font-size: 1.5rem;
			margin-bottom: 8px;
			font-weight: 700;
			margin-top: 0;
		}

		.tracker-text p {
			color: #cbd5e1;
			font-size: 0.95rem;
			line-height: 1.6;
			margin: 0;
		}

		.tracker-btn {
			background: linear-gradient(135deg, #10b981 0%, #059669 100%);
			color: white !important;
			padding: 14px 28px;
			text-decoration: none;
			border-radius: 12px;
			font-weight: 600;
			font-size: 1rem;
			transition: all 0.3s ease;
			white-space: nowrap;
			display: inline-flex;
			align-items: center;
			gap: 8px;
			box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
		}

		.tracker-btn:hover {
			transform: translateY(-2px);
			box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
			background: linear-gradient(135deg, #059669 0%, #047857 100%);
		}

		.tracker-btn span {
			transition: transform 0.3s ease;
		}

		.tracker-btn:hover span {
			transform: translateX(4px);
		}

		/* Grid and Cards */
		.opportunities-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
			gap: 30px;
			margin-top: 40px;
		}

			text-align: center;
			color: #e2e8

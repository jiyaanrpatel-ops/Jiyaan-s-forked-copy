	<!-- Page Wrapper -->

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/jquery.scrollex.min.js"></script>
	<script src="assets/js/browser.min.js"></script>
	<script src="assets/js/breakpoints.min.js"></script>
	<script src="assets/js/util.js"></script>
	<script src="assets/js/main.js"></script>

	<script>
		// 1. Core Data Array (Populated dynamically by Google Sheets)
		let volunteerOpportunities = [];

		// Your published Google Sheets CSV URL
		const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRINdpIfqYzmz7lNtKIkIuz75kA3wAOtAyE2lThkMty1Gpn7X9p3xIFLXV-hyX28PC-0LyFreFc1JXU/pub?gid=841646133&single=true&output=csv";

		let currentUserLat = null;
		let currentUserLng = null;

		// Function to calculate distance between two points (Haversine formula)
		function calculateDistance(lat1, lon1, lat2, lon2) {
			const R = 6371; // Earth's radius in kilometers
			const dLat = (lat2 - lat1) * Math.PI / 180;
			const dLon = (lon2 - lon1) * Math.PI / 180;
			const a = 
				Math.sin(dLat/2) * Math.sin(dLat/2) +
				Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
			const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
			return R * c; // Distance in kilometers
		}

		// Function to get user's current location
		function getUserLocation() {
			const statusElement = document.getElementById('location-status') || { textContent: "" };
			
			if (!navigator.geolocation) {
				statusElement.textContent = "Geolocation is not supported by your browser.";
				return;
			}

			statusElement.textContent = "Getting your location...";
			
			navigator.geolocation.getCurrentPosition(
				(position) => {
					currentUserLat = position.coords.latitude;
					currentUserLng = position.coords.longitude;
					statusElement.textContent = "Location acquired!";
					applyFilters();
				},
				(error) => {
					statusElement.textContent = "Unable to retrieve your location: " + error.message;
				}
			);
		}

		// Function to filter opportunities based on all criteria
		function filterOpportunities(location, distance, commitment) {
			let filtered = [...volunteerOpportunities];
			
			if (location === 'all') {
				// Keep all
			} else if (location === 'near-me') {
				if (currentUserLat !== null && currentUserLng !== null) {
					filtered = filtered.map(opp => {
						opp.distance = calculateDistance(currentUserLat, currentUserLng, opp.lat, opp.lng);
						return opp;
					}).filter(opp => {
						if (distance === 'all') return true;
						const maxDist = parseInt(distance);
						return opp.distance <= maxDist;
					});
				}
			} else {
				filtered = filtered.filter(opp => opp.city.toLowerCase() === location.toLowerCase());
				
				if (distance !== 'all' && currentUserLat !== null && currentUserLng !== null) {
					filtered = filtered.map(opp => {
						opp.distance = calculateDistance(currentUserLat, currentUserLng, opp.lat, opp.lng);
						return opp;
					}).filter(opp => {
						const maxDist = parseInt(distance);
						return opp.distance <= maxDist;
					});
				}
			}

			if (commitment !== 'all') {
				filtered = filtered.filter(opp => opp.timeCommitment === commitment);
			}
			
			if (location === 'near-me' && currentUserLat !== null && currentUserLng !== null) {
				filtered.sort((a, b) => a.distance - b.distance);
			}
			
			return filtered;
		}

		// Function to generate opportunity cards with structural animations
		function generateOpportunityCards(opportunities = volunteerOpportunities) {
			const container = document.getElementById('opportunities-container');
			if (!container) return;
			container.innerHTML = ''; 
			
			if (opportunities.length === 0) {
				container.innerHTML = '<div class="no-results">No volunteer opportunities match your current filters. Try adjusting your preferences.</div>';
				return;
			}
			
			opportunities.forEach((opportunity, index) => {
				const card = document.createElement('div');
				card.className = 'opportunity-card';
				card.style.transitionDelay = `${index * 0.1}s`;
				
				let commitmentTagHTML = opportunity.timeCommitment ? 
					`<div class="commitment-tags"><span class="commitment-tag flexible">${opportunity.timeCommitment}</span></div>` : '';
				
				let hoursHTML = opportunity.hoursPerWeek ? `<div class="hours-per-week">${opportunity.hoursPerWeek}</div>` : '';
				let distanceTagHTML = opportunity.distance !== undefined ? `<div class="distance-tag">${Math.round(opportunity.distance)} km</div>` : '';
				
				card.innerHTML = `
					<div class="card-image-container">
						<img src="${opportunity.imagePath}" alt="${opportunity.name}" onerror="this.src='images/causecircuit-logo.png'" />
						<div class="location-tag">${opportunity.city}</div>
						${distanceTagHTML}
					</div>
					<div class="card-content">
						<h3>${opportunity.name}</h3>
						<p style="margin-bottom: 8px; color: #60a5fa; font-weight: 600;">${opportunity.company}</p>
						<p>${opportunity.description}</p>
						${commitmentTagHTML}
						${hoursHTML}
						<button class="card-btn special">Learn More</button>
					</div>
				`;
				container.appendChild(card);
			});

			// Fix 1: Delays adding the class slightly to ensure CSS opacity transitions trigger smoothly
			setTimeout(() => {
				document.querySelectorAll('.opportunity-card').forEach(card => {
					card.classList.add('animate');
				});
			}, 100);
		}

		function applyFilters() {
			const locationFilter = document.getElementById('location-filter').value;
			const distanceFilter = document.getElementById('distance-filter').value;
			const commitmentFilter = document.getElementById('commitment-filter').value;
			
			const filteredOpportunities = filterOpportunities(locationFilter, distanceFilter, commitmentFilter);
			generateOpportunityCards(filteredOpportunities);
		}

		// Function to fetch data from live Google Sheet via Papa Parse
		async function fetchLiveSheetsData() {
			try {
				const response = await fetch(SHEET_CSV_URL);
				const csvText = await response.text();
				
				Papa.parse(csvText, {
					header: true,
					skipEmptyLines: true,
					complete: function(results) {
						// Maps spreadsheet row column keys to structural JS layout objects
						volunteerOpportunities = results.data.map(row => ({
							name: row['What is your Opportunity Title?'] || 'Volunteer Helper',
							company: row['What is your Organization Name?'] || 'Anonymous Org',
							description: row['What is the Description?'] || 'No description provided.',
							detailedDescription: row['What is the Description?'] || 'No description provided.',
							imagePath: row['Is there a Logo/Image URL for your organization?'] || 'images/causecircuit-logo.png',
							website: row['Website URL'] || '#', 
							city: row['Where is the Location/City?'] || 'Oshawa',
							lat: parseFloat(row['Latitude']) || 43.8946, 
							lng: parseFloat(row['Longitude']) || -78.8528,
							timeCommitment: "flexible",
							hoursPerWeek: row['What are the Hours Required to work?'] || 'Flexible'
						}));

						// Generate our dynamic layout tiles instantly
						generateOpportunityCards();
					}
				});
			} catch (error) {
				console.error("Error loading live data stream:", error);
				const container = document.getElementById('opportunities-container');
				if (container) {
					container.innerHTML = `<p style="color: #ef4444; text-align: center;">Failed to load live opportunities.</p>`;
				}
			}
		}

		// Initialize application setup rules
		document.addEventListener('DOMContentLoaded', function() {
			// Trigger Papa Parse fetch routine immediately
			fetchLiveSheetsData();

			// Event filter handlers
			document.getElementById('location-filter').addEventListener('change', applyFilters);
			document.getElementById('distance-filter').addEventListener('change', applyFilters);
			document.getElementById('commitment-filter').addEventListener('change', applyFilters);
			document.getElementById('use-location-btn').addEventListener('click', getUserLocation);

			const popup = document.getElementById('popup');
			const popupContent = document.getElementById('popup-content');

			// Modal click delegation managers
			document.addEventListener('click', function(event) {
				if (event.target.classList.contains('special')) {
					event.preventDefault();
					const card = event.target.closest('.opportunity-card');
					if (card) {
						const titleText = card.querySelector('h3').textContent;
						const opportunity = volunteerOpportunities.find(opp => opp.name === titleText);

						if (opportunity) {
							popupContent.innerHTML = `
								<div class="popup-header">
									<img src="${opportunity.imagePath}" alt="${opportunity.name}" />
									<div class="popup-location-tag">${opportunity.city}</div>
								</div>
								<h2 class="popup-title">${opportunity.name}</h2>
								<div class="popup-scroll-content">
									<div class="popup-body">
										<p style="color: #60a5fa; font-weight: 700; font-size: 1.1rem; margin-bottom: 12px;">Organization: ${opportunity.company}</p>
										<p>${opportunity.detailedDescription}</p>
									</div>
								</div>
								<div class="popup-actions">
									<a href="${opportunity.website}" target="_blank" class="volunteer-btn">
										<span>Volunteer Now</span>
										<span>→</span>
									</a>
									<button class="popup-close">Close</button>
								</div>
							`;
							
							popup.classList.add('active');
							
							popupContent.querySelector('.popup-close').addEventListener('click', () => {
								popup.classList.remove('active');
							});
						}
					}
				}
			});

			popup.addEventListener('click', (event) => {
				if (event.target === popup) {
					popup.classList.remove('active');
				}
			});
		});

		// Smooth parallax effect for page header
		window.addEventListener('scroll', () => {
			const scrolled = window.pageYOffset;
			const pageHeader = document.querySelector('.page-header');
			if (pageHeader) {
				pageHeader.style.transform = `translateY(${scrolled * 0.3}px)`;
			}
		});
	</script>

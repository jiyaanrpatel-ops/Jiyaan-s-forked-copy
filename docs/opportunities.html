<!DOCTYPE HTML>
<html>
<head>

    <style>
        /* Header Override Styles */
        #header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            z-index: 10000 !important;
            background: rgba(44, 62, 80, 0.95) !important;
            backdrop-filter: blur(10px) !important;
            opacity: 1 !important;
            visibility: visible !important;
            transform: translateY(0) !important;
            transition: all 0.3s ease !important;
        }

        #header h1 {
            display: flex !important;
            align-items: center !important;
        }

        #header h1 a {
            color: white !important;
            display: flex !important;
            align-items: center !important;
        }

        /* Header Logo Styling */
        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            object-fit: cover;
        }

        #header #nav ul.links li a {
            color: white !important;
        }

        #header #nav ul.links li a:hover {
            color: white !important;
        }

        #header #mobile-menu-toggle {
            color: white !important;
        }

        body {
            background: #f8f9fa;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            color: white;
            max-width: 800px;
            padding: 0 20px;
            animation: fadeInUp 1.5s ease-out;
        }

        /* Hero Logo Styling */
        .logo {
            margin-bottom: 40px;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .hero-content p {
            font-size: 1.4rem;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
            font-family: Raleway, Helvetica, sans-serif;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .particle-1 {
            top: 20%; 
            left: 10%; 
            width: 8px; 
            height: 8px; 
            animation-delay: 0s;
        }

        .particle-2 {
            top: 60%; 
            left: 85%; 
            width: 12px; 
            height: 12px; 
            animation-delay: 2s;
        }

        .particle-3 {
            top: 80%; 
            left: 20%; 
            width: 6px; 
            height: 6px; 
            animation-delay: 4s;
        }

        .particle-4 {
            top: 30%; 
            left: 75%; 
            width: 10px; 
            height: 10px; 
            animation-delay: 1s;
        }

        .particle-5 {
            top: 70%; 
            left: 60%; 
            width: 8px; 
            height: 8px; 
            animation-delay: 3s;
        }

        /* Content Sections */
        .content-section {
            padding: 100px 0;
            position: relative;
        }

        .section-blue {
            background: #4C5C96;
        }

        .section-alt {
            background: #45558D;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 50px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .section-header.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .section-header h2 {
            font-size: 3rem;
            color: #f8f9fa;
            margin-bottom: 20px;
            font-weight: 600;
            position: relative;
        }

        .section-header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: white;
            border-radius: 2px;
        }

        .section-header p {
            font-size: 1.2rem;
            color: #f8f9fa;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto;
            font-family: Raleway, Helvetica, sans-serif;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 60px;
            align-items: center;
            margin-top: 60px;
        }
